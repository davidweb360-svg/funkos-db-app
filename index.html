<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi colección Funko Dragon Ball</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mi colección Funko Dragon Ball</h1>
      <p>Control de colección, caja, faltantes y enlaces de compra</p>
    </div>
  </header>

  <main class="container">
    <section class="summary">
      <div class="card stat">
        <span>Total</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="card stat">
        <span>Tengo</span>
        <strong id="ownedCount">0</strong>
      </div>
      <div class="card stat">
        <span>Me faltan</span>
        <strong id="missingCount">0</strong>
      </div>
      <div class="card stat">
        <span>Con caja</span>
        <strong id="boxedCount">0</strong>
      </div>
    </section>

    <section class="filters card">
      <div class="filter-group">
        <label for="searchInput">Buscar</label>
        <input type="text" id="searchInput" placeholder="Goku, Vegeta, Majin Buu..." />
      </div>

      <div class="filter-group">
        <label for="statusFilter">Estado colección</label>
        <select id="statusFilter">
          <option value="all">Todos</option>
          <option value="owned">Los tengo</option>
          <option value="missing">Me faltan</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="boxFilter">Caja</label>
        <select id="boxFilter">
          <option value="all">Todos</option>
          <option value="boxed">Con caja</option>
          <option value="unboxed">Sin caja</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="sagaFilter">Saga</label>
        <select id="sagaFilter">
          <option value="all">Todas</option>
        </select>
      </div>

      <div class="filter-group actions">
        <button id="exportBtn">Exportar mi progreso</button>
        <button id="resetBtn" class="danger">Reset local</button>
      </div>
    </section>

    <section id="funkoGrid" class="grid"></section>
  </main>

  <template id="funkoCardTemplate">
    <article class="card funko-card">
      <div class="funko-image-wrap">
        <img class="funko-image" src="" alt="" />
      </div>

      <div class="funko-content">
        <div class="funko-head">
          <h3 class="funko-name"></h3>
          <span class="funko-number"></span>
        </div>

        <p class="funko-saga"></p>

        <div class="funko-meta">
          <span class="meta-year"></span>
          <span class="meta-print"></span>
          <span class="meta-line"></span>
        </div>

        <div class="funko-toggles">
          <label>
            <input type="checkbox" class="toggle-owned" />
            Lo tengo
          </label>
          <label>
            <input type="checkbox" class="toggle-boxed" />
            Tiene caja
          </label>
        </div>

        <div class="funko-notes">
          <label>Estado</label>
          <input type="text" class="input-state" placeholder="Nuevo, abierto, reservado..." />

          <label>Prioridad</label>
          <input type="text" class="input-priority" placeholder="Alta, media..." />

          <label>Notas</label>
          <textarea class="input-notes" rows="3" placeholder="Regalo ideal, edición exclusiva..."></textarea>
        </div>

        <div class="funko-links">
          <a class="link-amazon" target="_blank" rel="noopener noreferrer">Amazon</a>
          <a class="link-ebay" target="_blank" rel="noopener noreferrer">eBay</a>
          <a class="link-aliexpress" target="_blank" rel="noopener noreferrer">AliExpress</a>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
