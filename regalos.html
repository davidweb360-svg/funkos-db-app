<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colección Funko Dragon Ball</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Colección Funko Dragon Ball</h1>
      <p>Lista pública para ver qué tengo, qué me falta y qué deseo más 😎</p>
    </div>
  </header>

  <main class="container">
    <section class="summary">
      <div class="card stat">
        <span>Total</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="card stat">
        <span>Tengo</span>
        <strong id="ownedCount">0</strong>
      </div>
      <div class="card stat">
        <span>Me faltan</span>
        <strong id="missingCount">0</strong>
      </div>
      <div class="card stat">
        <span>Deseados</span>
        <strong id="wantedCount">0</strong>
      </div>
    </section>

    <section class="filters card">
      <div class="filter-group">
        <label for="searchInput">Buscar</label>
        <input type="text" id="searchInput" placeholder="Goku, Vegeta, Majin Buu..." />
      </div>

      <div class="filter-group">
        <label for="statusFilter">Estado</label>
        <select id="statusFilter">
          <option value="all">Todos</option>
          <option value="missing">Me faltan</option>
          <option value="owned">Los tengo</option>
          <option value="wanted">Deseados</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="sagaFilter">Saga</label>
        <select id="sagaFilter">
          <option value="all">Todas</option>
        </select>
      </div>
    </section>

    <section id="funkoGrid" class="grid"></section>
  </main>

  <template id="giftCardTemplate">
    <article class="card funko-card">
      <div class="funko-image-wrap">
        <img class="funko-image" src="" alt="" />
      </div>

      <div class="funko-content">
        <div class="funko-head">
          <h3 class="funko-name"></h3>
          <span class="funko-number"></span>
        </div>

        <div class="status-badges">
          <span class="status-pill status-owned hidden">Tengo</span>
          <span class="status-pill status-missing hidden">Me falta</span>
          <span class="status-pill status-wanted hidden">Deseado</span>
        </div>

        <p class="funko-saga"></p>

        <div class="funko-meta">
          <span class="meta-year"></span>
          <span class="meta-print"></span>
          <span class="meta-line"></span>
        </div>

        <div class="gift-note-wrap">
          <p class="gift-note gift-note-missing hidden">Este todavía no lo tengo.</p>
          <p class="gift-note gift-note-owned hidden">Este ya lo tengo en la colección.</p>
          <p class="gift-note gift-note-wanted hidden">Este está especialmente deseado.</p>
        </div>

        <div class="funko-links">
          <a class="link-amazon" target="_blank" rel="noopener noreferrer">Amazon</a>
          <a class="link-ebay" target="_blank" rel="noopener noreferrer">eBay</a>
          <a class="link-aliexpress" target="_blank" rel="noopener noreferrer">AliExpress</a>
        </div>
      </div>
    </article>
  </template>

  <script src="regalos.js"></script>
</body>
</html>
